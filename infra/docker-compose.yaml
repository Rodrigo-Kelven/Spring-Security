
services:
  postgres:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_DB: ${SPRING_DATASOURCE_DATABASE:-databasesecurityserver}
      POSTGRES_USER: ${SPRING_DATASOURCE_USERNAME:-dev_user}
      POSTGRES_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-dev_password_123}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - application-service-security
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 30s
      retries: 5
      start_period: 10s
      timeout: 10s

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "8082:80"
    depends_on:
      - postgres
    networks:
      - application-service-security


networks:
  application-service-security:
    driver: bridge
    name: application-service-security
    internal: false

volumes:
  postgres_data:
